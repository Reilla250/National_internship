services:
  # Frontend Service
  - type: web
    name: internship-frontend
    env: static
    repo: https://github.com/Reilla250/National_internship.git
    rootDir: ./
    buildCommand: npm run build
    buildFilter:
      paths:
        - src/**
        - public/**
        - package*.json
        - tailwind.config.js
        - .eslintrc.js
    staticPublishPath: ./build
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: https://national-internship-i7zp.onrender.com
    domains:
      - national-internship-frontend.onrender.com
