# =============================================
# Application Configuration
# =============================================
spring.application.name=internship-backend
server.port=8080

# =============================================
# Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/internship_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=3d6f424a5a1e8c2b9d0f7e4a1b8c3d2e9f0a7b6c5d4e3f2a1b0c9d8e7f6a5b4
app.jwt.expiration=86400000

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:3000

# =============================================
# Logging
# =============================================
logging.level.com.internship=INFO
logging.level.org.springframework.security=WARN
