services:
  # Backend Service
  - type: web
    name: internship-backend
    env: docker
    repo: https://github.com/Reilla250/National_internship.git
    rootDir: backend/internship-backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8085
      - key: DB_HOST
        value: jdbc:mysql://gateway01.eu-central-1.prod.aws.tidbcloud.com:4000/internship_db?useSSL=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2,TLSv1.3
      - key: DB_USER
        value: 3jMrabZWjdqqmw9.root
      - key: DB_PASSWORD
        value: 6QWm64HjDfYkgQLc
      - key: DB_NAME
        value: internship_db

  # Frontend Service
  - type: web
    name: internship-frontend
    env: static
    repo: https://github.com/Reilla250/National_internship.git
    rootDir: ./
    buildCommand: npm run build
    buildFilter:
      paths:
        - src/**
        - public/**
        - package*.json
        - tailwind.config.js
        - .eslintrc.js
    staticPublishPath: ./build
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: https://national-internship-3-gpza.onrender.com
    domains:
      - national-internship-frontend.onrender.com
