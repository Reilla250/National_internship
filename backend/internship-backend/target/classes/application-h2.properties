# =============================================
# Application Configuration - H2 Testing
# =============================================
spring.application.name=internship-backend
server.port=8080

# =============================================
# Database Configuration - H2
# =============================================
spring.datasource.url=jdbc:h2:mem:internship_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=3d6f424a5a1e8c2b9d0f7e4a1b8c3d2e9f0a7b6c5d4e3f2a1b0c9d8e7f6a5b4
app.jwt.expiration=86400000

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=http://localhost:3000

# =============================================
# Logging
# =============================================
logging.level.com.internship=INFO
logging.level.org.springframework.security=WARN
