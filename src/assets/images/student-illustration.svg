<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="studentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Student illustration -->
  <rect width="400" height="300" fill="#f0fdf4"/>
  
  <!-- Student figure -->
  <circle cx="200" cy="80" r="30" fill="#fbbf24"/>
  <path d="M200 110 Q180 130 180 160 L180 220 Q180 240 200 240 Q220 240 220 220 L220 160 Q220 130 200 110 Z" 
        fill="url(#studentGrad)"/>
  
  <!-- Graduation cap -->
  <ellipse cx="200" cy="75" rx="35" ry="8" fill="#1f2937"/>
  <rect x="195" y="60" width="10" height="15" fill="#1f2937"/>
  <rect x="165" y="75" width="70" height="3" fill="#1f2937"/>
  
  <!-- Books -->
  <rect x="100" y="200" width="40" height="50" rx="3" fill="#ef4444" transform="rotate(-10 120 225)"/>
  <rect x="260" y="200" width="40" height="50" rx="3" fill="#3b82f6" transform="rotate(10 280 225)"/>
  <rect x="180" y="230" width="40" height="30" rx="3" fill="#10b981"/>
  
  <!-- Laptop -->
  <rect x="150" y="180" width="100" height="60" rx="5" fill="#6b7280"/>
  <rect x="155" y="185" width="90" height="50" fill="#1f2937"/>
  <rect x="140" y="240" width="120" height="5" fill="#9ca3af"/>
  
  <!-- Floating elements -->
  <circle cx="80" cy="100" r="15" fill="#fde047" opacity="0.6"/>
  <circle cx="320" cy="120" r="12" fill="#a78bfa" opacity="0.6"/>
  <circle cx="350" cy="200" r="10" fill="#60a5fa" opacity="0.6"/>
  <circle cx="50" cy="180" r="8" fill="#34d399" opacity="0.6"/>
</svg>
