<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="adminGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Admin dashboard illustration -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Dashboard frame -->
  <rect x="20" y="20" width="360" height="260" rx="10" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" rx="10" fill="url(#adminGrad)"/>
  <circle cx="50" cy="40" r="8" fill="white"/>
  <rect x="70" y="35" width="60" height="10" rx="5" fill="white" opacity="0.8"/>
  <rect x="320" y="35" width="40" height="10" rx="5" fill="white" opacity="0.6"/>
  
  <!-- Stats cards -->
  <rect x="40" y="80" width="100" height="60" rx="5" fill="#dbeafe"/>
  <rect x="150" y="80" width="100" height="60" rx="5" fill="#dcfce7"/>
  <rect x="260" y="80" width="100" height="60" rx="5" fill="#fef3c7"/>
  
  <!-- Chart area -->
  <rect x="40" y="160" width="320" height="100" rx="5" fill="#f3f4f6"/>
  <polyline points="60,240 100,220 140,230 180,200 220,210 260,190 300,200 340,180" 
            stroke="#3b82f6" stroke-width="3" fill="none"/>
  <circle cx="60" cy="240" r="4" fill="#3b82f6"/>
  <circle cx="100" cy="220" r="4" fill="#3b82f6"/>
  <circle cx="140" cy="230" r="4" fill="#3b82f6"/>
  <circle cx="180" cy="200" r="4" fill="#3b82f6"/>
  <circle cx="220" cy="210" r="4" fill="#3b82f6"/>
  <circle cx="260" cy="190" r="4" fill="#3b82f6"/>
  <circle cx="300" cy="200" r="4" fill="#3b82f6"/>
  <circle cx="340" cy="180" r="4" fill="#3b82f6"/>
</svg>
