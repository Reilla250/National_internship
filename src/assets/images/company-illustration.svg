<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="companyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Company illustration -->
  <rect width="400" height="300" fill="#fff7ed"/>
  
  <!-- Office building -->
  <rect x="150" y="50" width="100" height="200" fill="url(#companyGrad)"/>
  
  <!-- Windows -->
  <rect x="160" y="60" width="20" height="20" fill="#fed7aa"/>
  <rect x="190" y="60" width="20" height="20" fill="#fed7aa"/>
  <rect x="220" y="60" width="20" height="20" fill="#fed7aa"/>
  
  <rect x="160" y="90" width="20" height="20" fill="#fed7aa"/>
  <rect x="190" y="90" width="20" height="20" fill="#fed7aa"/>
  <rect x="220" y="90" width="20" height="20" fill="#fed7aa"/>
  
  <rect x="160" y="120" width="20" height="20" fill="#fed7aa"/>
  <rect x="190" y="120" width="20" height="20" fill="#fed7aa"/>
  <rect x="220" y="120" width="20" height="20" fill="#fed7aa"/>
  
  <rect x="160" y="150" width="20" height="20" fill="#fed7aa"/>
  <rect x="190" y="150" width="20" height="20" fill="#fed7aa"/>
  <rect x="220" y="150" width="20" height="20" fill="#fed7aa"/>
  
  <!-- Door -->
  <rect x="185" y="200" width="30" height="50" fill="#92400e"/>
  
  <!-- People (employees) -->
  <circle cx="100" cy="230" r="8" fill="#1f2937"/>
  <path d="M100 238 Q95 245 95 255 L105 255 Q105 245 100 238 Z" fill="#3b82f6"/>
  
  <circle cx="300" cy="230" r="8" fill="#1f2937"/>
  <path d="M300 238 Q295 245 295 255 L305 255 Q305 245 300 238 Z" fill="#ec4899"/>
  
  <circle cx="200" cy="230" r="8" fill="#1f2937"/>
  <path d="M200 238 Q195 245 195 255 L205 255 Q205 245 200 238 Z" fill="#10b981"/>
  
  <!-- Cloud representing cloud computing/business -->
  <ellipse cx="320" cy="80" rx="40" ry="20" fill="#e0e7ff"/>
  <ellipse cx="300" cy="85" rx="30" ry="15" fill="#e0e7ff"/>
  <ellipse cx="340" cy="85" rx="25" ry="12" fill="#e0e7ff"/>
  
  <!-- Briefcase -->
  <rect x="60" y="180" width="30" height="20" rx="3" fill="#92400e"/>
  <rect x="70" y="175" width="10" height="5" fill="#92400e"/>
  
  <!-- Chart/graph -->
  <rect x="280" y="180" width="40" height="30" fill="white" stroke="#d1d5db" stroke-width="2"/>
  <rect x="285" y="200" width="5" height="8" fill="#10b981"/>
  <rect x="295" y="195" width="5" height="13" fill="#3b82f6"/>
  <rect x="305" y="190" width="5" height="18" fill="#f59e0b"/>
  <rect x="315" y="185" width="5" height="23" fill="#ef4444"/>
</svg>
