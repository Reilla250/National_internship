<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="governmentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Government illustration -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Government building -->
  <rect x="100" y="80" width="200" height="170" fill="url(#governmentGrad)"/>
  
  <!-- Dome -->
  <ellipse cx="200" cy="80" rx="100" ry="40" fill="#475569"/>
  <ellipse cx="200" cy="80" rx="80" ry="30" fill="#64748b"/>
  
  <!-- Pillars -->
  <rect x="120" y="80" width="12" height="170" fill="#334155"/>
  <rect x="145" y="80" width="12" height="170" fill="#334155"/>
  <rect x="243" y="80" width="12" height="170" fill="#334155"/>
  <rect x="268" y="80" width="12" height="170" fill="#334155"/>
  
  <!-- Windows -->
  <rect x="165" y="100" width="20" height="20" fill="#fbbf24"/>
  <rect x="215" y="100" width="20" height="20" fill="#fbbf24"/>
  <rect x="165" y="140" width="20" height="20" fill="#fbbf24"/>
  <rect x="215" y="140" width="20" height="20" fill="#fbbf24"/>
  <rect x="165" y="180" width="20" height="20" fill="#fbbf24"/>
  <rect x="215" y="180" width="20" height="20" fill="#fbbf24"/>
  
  <!-- Door -->
  <rect x="185" y="210" width="30" height="40" fill="#1e293b"/>
  <circle cx="208" cy="230" r="2" fill="#fbbf24"/>
  
  <!-- Flag -->
  <rect x="198" y="30" width="4" height="50" fill="#6b7280"/>
  <rect x="202" y="30" width="30" height="20" fill="#ef4444"/>
  <polygon points="202,30 202,50 232,40" fill="#fbbf24"/>
  
  <!-- Map of regions -->
  <g transform="translate(50, 50)">
    <path d="M0,20 L15,15 L20,25 L10,30 L0,25 Z" fill="#3b82f6" opacity="0.7"/>
    <path d="M20,25 L30,20 L35,30 L25,35 L20,30 Z" fill="#10b981" opacity="0.7"/>
    <path d="M10,30 L20,30 L25,35 L15,40 L10,35 Z" fill="#f59e0b" opacity="0.7"/>
  </g>
  
  <!-- People representing citizens -->
  <circle cx="30" cy="250" r="6" fill="#1f2937"/>
  <path d="M30 256 Q26 260 26 265 L34 265 Q34 260 30 256 Z" fill="#3b82f6"/>
  
  <circle cx="370" cy="250" r="6" fill="#1f2937"/>
  <path d="M370 256 Q366 260 366 265 L374 265 Q374 260 370 256 Z" fill="#ec4899"/>
  
  <!-- Documents/papers -->
  <rect x="60" y="180" width="12" height="16" rx="1" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <rect x="62" y="183" width="8" height="1" fill="#e5e7eb"/>
  <rect x="62" y="186" width="6" height="1" fill="#e5e7eb"/>
  <rect x="62" y="189" width="8" height="1" fill="#e5e7eb"/>
  
  <rect x="328" y="180" width="12" height="16" rx="1" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <rect x="330" y="183" width="8" height="1" fill="#e5e7eb"/>
  <rect x="330" y="186" width="6" height="1" fill="#e5e7eb"/>
  <rect x="330" y="189" width="8" height="1" fill="#e5e7eb"/>
  
  <!-- Scale of justice -->
  <g transform="translate(350, 100)">
    <rect x="-1" y="0" width="2" height="30" fill="#6b7280"/>
    <rect x="-15" y="-5" width="30" height="3" fill="#6b7280"/>
    <circle cx="-10" cy="5" r="4" fill="#fbbf24"/>
    <circle cx="10" cy="5" r="4" fill="#fbbf24"/>
    <rect x="-12" y="8" width="4" height="10" fill="#6b7280"/>
    <rect x="8" y="8" width="4" height="10" fill="#6b7280"/>
  </g>
  
  <!-- Chart showing growth -->
  <g transform="translate(30, 100)">
    <rect x="0" y="20" width="8" height="20" fill="#3b82f6"/>
    <rect x="10" y="15" width="8" height="25" fill="#10b981"/>
    <rect x="20" y="10" width="8" height="30" fill="#f59e0b"/>
    <rect x="30" y="5" width="8" height="35" fill="#ef4444"/>
  </g>
</svg>
